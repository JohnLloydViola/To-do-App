<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main</title>
  <link rel="icon" href="images/favicon-32x32.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header></header>
  
  <main>
    <div class="addTodo">
      <div>
        <h1>T O D O</h1>

      </div>
      <div>
        <input type="text" placeholder="Create a new todo...">
        <input class="checkbox" type="checkbox">

    </div>


    <div class="tasks">
      <div>
        <label>

        </label>
      </div>

       <div>
        <label>

        </label>
      </div>

       <div>
        <label>
          <input class="checkbox" type="checkbox">
          <p>Jog around the park 3x</p>
        </label>
      </div>

    </div>

    <div class="status">
      <p>0 items left</p>
      <div>
        <button class="statusButton statusActive">All</button>
        <button class="statusButton">Active</button>
        <button class="statusButton">Completed</button>
      </div>
      <button>Clear Completed</button>
    </div>
  </main>

<script src="script.js"></script>
